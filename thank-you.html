<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks | Extraxtz Web Design</title>
  <meta name="description" content="Thanks for contacting Extraxtz Web Design.">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/favicon.ico.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #101317;
      --muted: #5d6876;
      --line: #dfe5ec;
      --paper: #f8fafc;
      --white: #ffffff;
      --teal: #0ab7b0;
      --teal-dark: #087f7a;
      --shadow: 0 20px 60px rgba(16, 19, 23, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Inter", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at center, rgba(10, 183, 176, 0.12), transparent 34%),
        var(--paper);
    }

    .thanks-card {
      width: min(680px, 100%);
      padding: clamp(28px, 5vw, 52px);
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .logo {
      width: min(260px, 72vw);
      margin-bottom: 34px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.1rem, 7vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      color: var(--white);
      background: var(--teal-dark);
      border-radius: 8px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 14px 30px rgba(10, 183, 176, 0.24);
    }

    a.secondary {
      color: var(--ink);
      background: var(--white);
      border: 1px solid var(--line);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main class="thanks-card">
    <img class="logo" src="assets/logo.png" alt="Extraxtz Web Design">
    <h1>Thanks!</h1>
    <p>Your quote request was sent. We will review the details and reply as soon as possible.</p>
    <div class="actions">
      <a href="index.html">Back to Home</a>
      <a class="secondary" href="index.html#pricing">View Pricing</a>
    </div>
  </main>
</body>
</html>
